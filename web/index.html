<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_web_font_repro">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_web_font_repro</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // Repro for kazweda/flutter-web-font-repro issue #5, hypothesis 2: the
    // punctuation glyph choice may depend on the arrival order/availability
    // of CanvasKit's automatic CJK fallback font fetches (notosanssc /
    // notosanshk / notosansjp), not on navigator.language per se. Instead of
    // requiring manual DevTools Request Blocking, ?only=raceBlockJp /
    // ?only=raceBlockScHk patch window.fetch here (before the Flutter engine
    // and its font fallback manager start requesting fonts) to deterministically
    // drop one side of the race.
    (function () {
      var only = new URLSearchParams(location.search).get('only');
      var blockPattern = null;
      if (only === 'raceBlockJp') {
        // Only notosanssc/notosanshk are allowed to arrive; notosansjp never
        // does, simulating CanvasKit's fallback picking a glyph before/without
        // the Japanese candidate being available.
        blockPattern = /notosansjp/i;
      } else if (only === 'raceBlockScHk') {
        // Inverse control: only notosansjp is allowed to arrive.
        blockPattern = /notosans(sc|hk)/i;
      }
      if (blockPattern) {
        var originalFetch = window.fetch.bind(window);
        window.fetch = function (input, init) {
          var url = typeof input === 'string' ? input : (input && input.url) || '';
          if (blockPattern.test(url)) {
            console.warn('[font-repro] blocking fetch to simulate fallback race:', url);
            return Promise.reject(new TypeError('Failed to fetch: blocked by font-repro (' + only + ')'));
          }
          return originalFetch(input, init);
        };
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
